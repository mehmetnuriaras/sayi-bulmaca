<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sayı Bulmaca - Pro</title>
    <script src="https://cdn.socketio.io/4.7.2/socket.io.min.js"></script>
    <style>
      /* Modern Karanlık Tema Tasarımı [13, 14] */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1a1a2e;
        color: #fff;
        text-align: center;
        margin: 0;
        padding: 20px;
      }
      .screen {
        display: none;
        max-width: 500px;
        margin: 0 auto;
        background: #16213e;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      button {
        background: #e94560;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        margin: 10px;
        transition: 0.3s;
      }
      button:hover {
        background: #ff4d6d;
        transform: scale(1.05);
      }
      input {
        padding: 12px;
        border-radius: 8px;
        border: none;
        width: 80%;
        margin: 10px;
        font-size: 18px;
        text-align: center;
      }

      /* 1. İyileştirme: Kendi Sayım Göstergesi */
      .my-secret-display {
        background: #0f3460;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 15px;
        border: 1px solid #e94560;
      }
      #display-my-secret-number {
        font-weight: bold;
        color: #e94560;
        font-size: 20px;
        letter-spacing: 3px;
      }

      /* 2. İyileştirme: Rakam Notları Tasarımı */
      .notes-grid {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin: 20px 0;
        flex-wrap: wrap;
      }
      .note-box {
        width: 38px;
        height: 38px;
        border: 2px solid #533483;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.2s;
        background: #1a1a2e;
      }
      .state-yellow {
        background: #fbc02d !important;
        color: #000;
      }
      .state-red {
        background: #d32f2f !important;
        color: #fff;
      }
      .state-green {
        background: #388e3c !important;
        color: #fff;
      }

      .history-item {
        display: flex;
        justify-content: space-between;
        background: #0f3460;
        padding: 10px;
        margin: 5px 0;
        border-radius: 8px;
        animation: slideIn 0.4s ease;
      }
      @keyframes slideIn {
        from {
          transform: translateX(-20px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- GİRİŞ EKRANI -->
    <div id="auth-screen" class="screen" style="display: block">
      <h2>Sayı Bulmaca</h2>
      <button onclick="guestLogin()">Misafir Olarak Oyna</button>
    </div>

    <!-- MENÜ EKRANI -->
    <div id="menu-screen" class="screen">
      <h3 id="welcome-msg">Hoş Geldin!</h3>
      <button onclick="findMatch()">Oyun Bul</button>
    </div>

    <!-- YÜKLEME EKRANI -->
    <div id="loading-screen" class="screen">
      <div class="spinner"></div>
      <p>Rakip Aranıyor...</p>
    </div>

    <!-- SAYI BELİRLEME EKRANI -->
    <div id="set-number-screen" class="screen">
      <h3>Gizli Sayını Belirle</h3>
      <p>4 haneli, rakamları farklı, 0 ile başlamayan bir sayı gir.</p>
      <input
        type="text"
        id="secret-input"
        maxlength="4"
        placeholder="Örn: 1234"
      />
      <button onclick="lockNumber()">Sayımı Kilitle</button>
    </div>

    <!-- OYUN EKRANI -->
    <div id="game-screen" class="screen">
      <div class="my-secret-display">
        <span>Senin Sayın: </span
        ><span id="display-my-secret-number">----</span>
      </div>

      <div
        id="turn-info"
        style="color: #e94560; font-weight: bold; margin-bottom: 10px"
      >
        Sıra Bekleniyor...
      </div>

      <!-- Rakam Notları Paneli -->
      <div class="notes-grid">
        <div class="note-box" onclick="cycleColor(this)">0</div>
        <div class="note-box" onclick="cycleColor(this)">1</div>
        <div class="note-box" onclick="cycleColor(this)">2</div>
        <div class="note-box" onclick="cycleColor(this)">3</div>
        <div class="note-box" onclick="cycleColor(this)">4</div>
        <div class="note-box" onclick="cycleColor(this)">5</div>
        <div class="note-box" onclick="cycleColor(this)">6</div>
        <div class="note-box" onclick="cycleColor(this)">7</div>
        <div class="note-box" onclick="cycleColor(this)">8</div>
        <div class="note-box" onclick="cycleColor(this)">9</div>
      </div>

      <div id="guess-area" style="display: none">
        <input
          type="text"
          id="guess-input"
          maxlength="4"
          placeholder="Tahminin?"
        />
        <button onclick="sendGuess()">Gönder</button>
      </div>

      <div id="game-history" style="text-align: left; margin-top: 20px"></div>
    </div>

    <script>
      const socket = io();
      let myUsername = "";
      let myRoom = "";
      let mySecretNumber = "";

      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => (s.style.display = "none"));
        document.getElementById(id).style.display = "block";
      }

      function guestLogin() {
        socket.emit("misafir_girisi");
      }

      socket.on("giris_basarili", (data) => {
        myUsername = data.username;
        document.getElementById("welcome-msg").innerText =
          "Hoş Geldin, " + myUsername;
        showScreen("menu-screen");
      });

      function findMatch() {
        showScreen("loading-screen");
        socket.emit("oyun_bul", { username: myUsername });
      }

      socket.on("match_found", (data) => {
        myRoom = data.room;
        showScreen("set-number-screen");
      });

      function lockNumber() {
        const num = document.getElementById("secret-input").value;
        mySecretNumber = num;
        socket.emit("sayi_kilitle", { room: myRoom, sayi: num });
        document.getElementById("set-number-screen").innerHTML =
          "<h3>Sayı Kilitlendi!</h3><p>Rakip bekleniyor...</p>";
      }

      socket.on("oyun_basladi", (data) => {
        showScreen("game-screen");
        // 1. İyileştirme: Kendi sayısını ekrana yazdır
        document.getElementById("display-my-secret-number").innerText =
          mySecretNumber;
        updateTurn(data.turn);
      });

      function updateTurn(turn) {
        const info = document.getElementById("turn-info");
        const area = document.getElementById("guess-area");
        if (turn === myUsername) {
          info.innerText = "SIRA SENDE!";
          area.style.display = "block";
        } else {
          info.innerText = "RAKİBİN HAMLESİ BEKLENİYOR...";
          area.style.display = "none";
        }
      }

      function sendGuess() {
        const g = document.getElementById("guess-input").value;
        socket.emit("tahmin_gonder", {
          room: myRoom,
          tahmin: g,
          username: myUsername,
        });
        document.getElementById("guess-input").value = "";
      }

      socket.on("tahmin_sonuc", (data) => {
        const hist = document.getElementById("game-history");
        hist.innerHTML =
          `<div class="history-item"><span>${data.player}: ${data.tahmin}</span> <b>${data.sonuc}</b></div>` +
          hist.innerHTML;
        updateTurn(data.next_turn);
      });

      // 2. İyileştirme: Renk değiştirme mantığı
      function cycleColor(el) {
        if (el.classList.contains("state-yellow")) {
          el.classList.remove("state-yellow");
          el.classList.add("state-red");
        } else if (el.classList.contains("state-red")) {
          el.classList.remove("state-red");
          el.classList.add("state-green");
        } else if (el.classList.contains("state-green")) {
          el.classList.remove("state-green");
        } else {
          el.classList.add("state-yellow");
        }
      }

      socket.on("hata", (data) => alert(data.msg));
    </script>
  </body>
</html>
