<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sayı Bulmaca - Multiplayer</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="/socket.io/socket.io.js"></script>
    <style>
      /* Dil butonu için küçük bir estetik ekleme */
      .lang-switcher {
        display: flex;
        justify-content: flex-end;
        gap: 5px;
        margin-bottom: 10px;
      }
      .lang-btn {
        background: #29292e;
        color: #7c7c8a;
        border: 1px solid #444;
        padding: 4px 10px;
        font-size: 12px;
        border-radius: 4px;
        width: auto;
        cursor: pointer;
      }
      .lang-btn.active {
        background: #8257e5;
        color: white;
        border-color: #8257e5;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <div class="lang-switcher">
        <button class="lang-btn active" id="btn-tr" onclick="setLanguage('tr')">
          TR
        </button>
        <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">
          EN
        </button>
      </div>

      <header>
        <h1 id="txt-title">Sayı Bulmaca</h1>
        <div id="role-badge" class="badge">Bağlanılıyor...</div>
        <div id="turn-badge" class="badge hide">Sıra Bekleniyor...</div>
      </header>

      <div id="my-number-panel" class="panel hide">
        <h3 id="txt-my-secret">
          Senin Gizli Sayın: <span id="secret-display">****</span>
        </h3>
      </div>

      <div id="setup-screen" class="screen">
        <h2 id="txt-setup-title">4 Haneli Gizli Sayını Belirle</h2>
        <p id="txt-setup-desc">Rakamları birbirinden farklı olmalıdır.</p>
        <input
          type="text"
          id="secret-input"
          maxlength="4"
          placeholder="Örn: 1234"
          pattern="\d*"
        />
        <button id="send-secret-btn" onclick="sendSecret()">
          Sayımı Kilitle
        </button>
      </div>

      <div id="game-screen" class="screen hide">
        <div class="input-area">
          <input
            type="text"
            id="guess-input"
            maxlength="4"
            placeholder="Tahminin nedir?"
            pattern="\d*"
          />
          <button id="send-guess-btn" onclick="sendGuess()">Tahmin Et</button>
        </div>

        <div class="history-container">
          <div class="history-block">
            <h3 id="txt-p1-history">Oyuncu 1 Tahminleri</h3>
            <div id="p1-history" class="history-list"></div>
          </div>
          <div class="history-block">
            <h3 id="txt-p2-history">Oyuncu 2 Tahminleri</h3>
            <div id="p2-history" class="history-list"></div>
          </div>
        </div>
      </div>

      <div id="win-screen" class="screen hide">
        <div class="win-animation">🎉</div>
        <h2 id="win-message">Tebrikler Kazandınız!</h2>
        <button id="btn-restart" onclick="location.reload()">
          Yeniden Oyna
        </button>
      </div>
    </div>

    <script>
      const socket = io(window.location.origin, {
        transports: ["websocket", "polling"],
      });

      let myId = null;
      let myTurn = false;
      let currentLang = "tr"; // Varsayılan dil Türkçe

      // DİL SÖZLÜĞÜ (Çeviriler)
      const translations = {
        tr: {
          title: "Sayı Bulmaca",
          connecting: "Bağlanılıyor...",
          waitingTurn: "Sıra Bekleniyor...",
          playerInfo: "Sen: Oyuncu ",
          mySecret: "Senin Gizli Sayın: ",
          setupTitle: "4 Haneli Gizli Sayını Belirle",
          setupDesc: "Rakamları birbirinden farklı olmalıdır.",
          lockBtn: "Sayımı Kilitle",
          guessPlaceholder: "Tahminin nedir?",
          guessBtn: "Tahmin Et",
          p1Hist: "Oyuncu 1 Tahminleri",
          p2Hist: "Oyuncu 2 Tahminleri",
          waitingOpponent:
            "Sayın kilitlendi. Rakibin sayısını seçmesi bekleniyor...",
          yourTurn: "Senin Sıran!",
          opponentTurn: "Rakibin Sırası...",
          winMsg: "🏆 OYUNU KAZANDINIZ!",
          loseMsg: "❌ RAKİBİNİZ SAYINIZI BULDU!",
          restartBtn: "Yeniden Oyna",
          alertRoomFull: "Oda dolu!",
          alertFourDigits: "4 haneli bir sayı girin!",
          alertDisconnect: "Bir oyuncu odadan ayrıldı, oyun sıfırlanıyor.",
        },
        en: {
          title: "Number Puzzle",
          connecting: "Connecting...",
          waitingTurn: "Waiting for turn...",
          playerInfo: "You: Player ",
          mySecret: "Your Secret Number: ",
          setupTitle: "Determine Your 4-Digit Secret Number",
          setupDesc: "Digits must be unique.",
          lockBtn: "Lock My Number",
          guessPlaceholder: "What's your guess?",
          guessBtn: "Guess",
          p1Hist: "Player 1 Guesses",
          p2Hist: "Player 2 Guesses",
          waitingOpponent:
            "Your number is locked. Waiting for opponent to choose...",
          yourTurn: "Your Turn!",
          opponentTurn: "Opponent's Turn...",
          winMsg: "🏆 YOU WON THE GAME!",
          loseMsg: "❌ OPPONENT FOUND YOUR NUMBER!",
          restartBtn: "Play Again",
          alertRoomFull: "Room is full!",
          alertFourDigits: "Please enter a 4-digit number!",
          alertDisconnect: "A player disconnected, restarting the game.",
        },
      };

      // DİL DEĞİŞTİRME FONKSİYONU
      function setLanguage(lang) {
        currentLang = lang;

        // Buton aktiflik sınıflarını güncelle
        document
          .getElementById("btn-tr")
          .classList.toggle("active", lang === "tr");
        document
          .getElementById("btn-en")
          .classList.toggle("active", lang === "en");

        // Statik metinleri güncelle
        document.getElementById("txt-title").innerText =
          translations[lang].title;
        document.getElementById("txt-setup-title").innerText =
          translations[lang].setupTitle;
        document.getElementById("txt-setup-desc").innerText =
          translations[lang].setupDesc;
        document.getElementById("send-secret-btn").innerText =
          translations[lang].lockBtn;
        document.getElementById("guess-input").placeholder =
          translations[lang].guessPlaceholder;
        document.getElementById("send-guess-btn").innerText =
          translations[lang].guessBtn;
        document.getElementById("txt-p1-history").innerText =
          translations[lang].p1Hist;
        document.getElementById("txt-p2-history").innerText =
          translations[lang].p2Hist;
        document.getElementById("btn-restart").innerText =
          translations[lang].restartBtn;

        // Dinamik panelleri o anki duruma göre güncelle
        if (myId) {
          document.getElementById("role-badge").innerText =
            translations[lang].playerInfo + myId;
        } else {
          document.getElementById("role-badge").innerText =
            translations[lang].connecting;
        }

        if (
          document.getElementById("game-screen").classList.contains("hide") ===
          false
        ) {
          updateTurn(myTurn ? myId : myId === 1 ? 2 : 1);
        }
      }

      socket.on("oyuncu_atandi", (data) => {
        myId = data.oyuncu_id;
        document.getElementById("role-badge").innerText =
          translations[currentLang].playerInfo + myId;
      });

      function sendSecret() {
        const val = document.getElementById("secret-input").value;
        if (val.length !== 4 || isNaN(val))
          return alert(translations[currentLang].alertFourDigits);

        socket.emit("sayi_gonder", { sayi: val });
        document.getElementById("setup-screen").innerHTML =
          `<h3>${translations[currentLang].waitingOpponent}</h3>`;
      }

      socket.on("oyun_basladi", (data) => {
        document.getElementById("setup-screen").classList.add("hide");
        document.getElementById("game-screen").classList.remove("hide");
        document.getElementById("my-number-panel").classList.remove("hide");

        const myNum = myId === 1 ? data.o1_sayi : data.o2_sayi;
        // "Senin Gizli Sayın: " yazısını koruyarak sayıyı ekle
        document.getElementById("my-number-panel").innerHTML =
          `<h3>${translations[currentLang].mySecret} <span id="secret-display">${myNum}</span></h3>`;

        updateTurn(data.sira);
      });

      function updateTurn(sira) {
        myTurn = sira === myId;
        const badge = document.getElementById("turn-badge");
        badge.classList.remove("hide");

        if (myTurn) {
          badge.innerText = translations[currentLang].yourTurn;
          badge.style.background = "#2ecc71";
          document.getElementById("guess-input").disabled = false;
          document.getElementById("send-guess-btn").disabled = false;
        } else {
          badge.innerText = translations[currentLang].opponentTurn;
          badge.style.background = "#e74c3c";
          document.getElementById("guess-input").disabled = true;
          document.getElementById("send-guess-btn").disabled = true;
        }
      }

      function sendGuess() {
        const val = document.getElementById("guess-input").value;
        if (val.length !== 4 || isNaN(val))
          return alert(translations[currentLang].alertFourDigits);
        socket.emit("tahmin_gonder", { tahmin: val });
        document.getElementById("guess-input").value = "";
      }

      socket.on("tahmin_sonuc", (data) => {
        const card = document.createElement("div");
        card.className = "history-card slide-in";
        card.innerHTML = `<span class="num">${data.tahmin}</span> <span class="res">${data.sonuc}</span>`;

        const targetList = data.tahmin_eden === 1 ? "p1-history" : "p2-history";
        document.getElementById(targetList).prepend(card);

        updateTurn(data.yeni_sira);
      });

      socket.on("oyun_bitti", (data) => {
        document.getElementById("game-screen").classList.add("hide");
        document.getElementById("win-screen").classList.remove("hide");
        document.getElementById("win-message").innerText =
          data.kazanan === myId
            ? translations[currentLang].winMsg
            : translations[currentLang].loseMsg;
      });

      socket.on("oyun_sifirlandi", () => {
        alert(translations[currentLang].alertDisconnect);
        location.reload();
      });
    </script>
  </body>
</html>
