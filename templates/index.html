<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4 Haneli Sayı Bulmaca - Çok Oyunculu</title>
    <script src="https://cdn.socketio.org/4.7.2/socketio.min.js"></script>
    <style>
      body {
        font-family: "Arial", sans-serif;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      .screen {
        display: none;
      }
      .active {
        display: block;
      }

      input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      button {
        width: 95%;
        padding: 12px;
        background-color: #2ecc71;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        margin: 5px 0;
      }
      button:hover {
        background-color: #27ae60;
      }
      .secondary-btn {
        background-color: #3498db;
      }
      .secondary-btn:hover {
        background-color: #2980b9;
      }
      .guest-btn {
        background-color: #7f8c8d;
      }
      .guest-btn:hover {
        background-color: #718093;
      }

      /* Loading Animasyonu */
      .spinner {
        border: 4px solid rgba(0, 0, 0, 0.1);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border-left-color: #2ecc71;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="auth-screen" class="screen active">
        <h2>Sayı Bulmaca Oyununa Giriş</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı" />
        <input type="password" id="password" placeholder="Şifre" />
        <button onclick="login()">Giriş Yap</button>
        <button class="secondary-btn" onclick="register()">Kayıt Ol</button>
        <hr />
        <button class="guest-btn" onclick="loginAsGuest()">
          Misafir Olarak Oyna
        </button>
        <p id="auth-error" style="color: red"></p>
      </div>

      <div id="menu-screen" class="screen">
        <h2>Hoş geldin, <span id="display-name"></span>!</h2>
        <p>Çevrimiçi rakiplerle eşleşmek için hazır ol.</p>
        <button onclick="startMatchmaking()">Oyun Bul</button>
        <button class="guest-btn" onclick="logout()">Çıkış Yap</button>
      </div>

      <div id="loading-screen" class="screen">
        <h2 id="loading-text">Rakip Aranıyor...</h2>
        <div class="spinner"></div>
        <p>Lütfen diğer bir oyuncunun sıraya girmesini bekleyin.</p>
      </div>

      <div id="game-screen" class="screen">
        <h2>Oyun Başladı!</h2>
        <p>Rakibin: <strong id="opponent-name"></strong></p>
        <p>Oda ID: <span id="room-display"></span></p>

        <div style="background: #eee; padding: 15px; border-radius: 8px">
          <p>
            Buraya önceki aşamalarda hazırladığımız 4 haneli sayı tahmin
            filtreleri ve oyun tahtası gelecek.
          </p>
        </div>
      </div>
    </div>

    <script>
      const socket = io();
      let currentUsername = "";
      let currentRoom = "";

      // Ekran Değiştirme Fonksiyonu
      function showScreen(screenId) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(screenId).classList.add("active");
      }

      // Kayıt Olma İşlemi
      async function register() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;

        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: u, password: p }),
        });
        const data = await res.json();
        alert(data.message);
      }

      // Giriş Yapma İşlemi
      async function login() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        const errorDiv = document.getElementById("auth-error");

        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: u, password: p }),
        });
        const data = await res.json();

        if (data.success) {
          currentUsername = data.username;
          document.getElementById("display-name").innerText = currentUsername;
          showScreen("menu-screen");
        } else {
          errorDiv.innerText = data.message;
        }
      }

      // Misafir Girişi İşlemi (Şifresiz rastgele isim üretme)
      function loginAsGuest() {
        const randomId = Math.floor(1000 + Math.random() * 9000);
        currentUsername = `Misafir_${randomId}`;
        document.getElementById("display-name").innerText = currentUsername;
        showScreen("menu-screen");
      }

      // Çıkış Yapma
      function logout() {
        currentUsername = "";
        showScreen("auth-screen");
      }

      // Eşleştirme Havuzuna Girme
      function startMatchmaking() {
        showScreen("loading-screen");
        socket.emit("find_match", { username: currentUsername });
      }

      // SOCKET DINLEYICILERI
      socket.on("waiting_for_match", function (data) {
        document.getElementById("loading-text").innerText = data.message;
      });

      socket.on("match_found", function (data) {
        currentRoom = data.room_id;
        document.getElementById("opponent-name").innerText = data.opponent;
        document.getElementById("room-display").innerText = data.room_id;
        showScreen("game-screen");
      });
    </script>
  </body>
</html>
